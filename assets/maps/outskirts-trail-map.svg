<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">小镇东北郊外追踪地图</title>
  <desc id="desc">KEN小队沿导师指向的小镇东北方向出发，发现战斗痕迹和脚印，沿曲折路线行进数公里后抵达与僵尸战斗的河流。城市北方的近期黑潮战场是另一地点。</desc>
  <defs>
    <pattern id="fog" width="22" height="22" patternUnits="userSpaceOnUse" patternTransform="rotate(28)">
      <rect width="22" height="22" fill="#e8eaeb"/>
      <line x1="0" y1="0" x2="0" y2="22" stroke="#aeb3b5" stroke-width="6" opacity="0.34"/>
    </pattern>
    <pattern id="warFog" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(-25)">
      <rect width="20" height="20" fill="#60686a"/>
      <line x1="0" y1="0" x2="0" y2="20" stroke="#31383b" stroke-width="6" opacity="0.45"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8b3d2e"/>
    </marker>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#202629" flood-opacity="0.24"/>
    </filter>
    <style>
      .label { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #202629; letter-spacing: 0; }
      .small { font-size: 18px; }
      .medium { font-size: 22px; font-weight: 650; }
      .large { font-size: 34px; font-weight: 750; }
      .note { fill: #555d60; font-size: 17px; }
      .light { fill: #f7f4ea; }
      .accent { fill: #8b3d2e; }
      .water { fill: #285b6e; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#f4f2ea"/>
  <rect x="24" y="24" width="1352" height="852" rx="6" fill="url(#fog)" stroke="#333b3e" stroke-width="3"/>

  <!-- Approximate northern war zone. -->
  <path d="M24 24 H640 V175 C550 151 477 194 385 168 C284 139 203 191 115 168 C78 158 50 164 24 179 Z" fill="url(#warFog)"/>
  <text x="315" y="75" text-anchor="middle" class="label large light" style="fill:#f7f4ea">城市北方：近期黑潮战场</text>
  <text x="315" y="110" text-anchor="middle" class="label small light" style="fill:#f7f4ea">与东北方向的导师线索不是同一地点</text>

  <!-- Explored corridor clears part of the fog without claiming the whole region. -->
  <path d="M236 729 C332 646 383 576 481 559 C585 540 594 458 683 421 C792 376 818 304 921 294 C1039 283 1082 357 1160 322"
        fill="none" stroke="#f5f1e5" stroke-width="150" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>
  <path d="M236 729 C332 646 383 576 481 559 C585 540 594 458 683 421 C792 376 818 304 921 294 C1039 283 1082 357 1160 322"
        fill="none" stroke="#94a47d" stroke-width="4" stroke-dasharray="14 12" stroke-linecap="round" opacity="0.9"/>

  <!-- Town edge and northeast exit. -->
  <path d="M24 875 V674 C70 618 148 604 223 625 C288 642 321 700 305 764 C293 812 251 850 198 875 Z" fill="#dfe9d8" stroke="#59636a" stroke-width="9"/>
  <text x="62" y="700" class="label medium">小镇</text>
  <text x="62" y="727" class="label note">城墙及东北边缘仅作示意</text>
  <g transform="translate(236 718)">
    <path d="M-24 20 V-33 H24 V20" fill="none" stroke="#374044" stroke-width="7"/>
    <path d="M-34 -33 H34" stroke="#374044" stroke-width="8"/>
  </g>
  <text x="255" y="778" class="label medium">正式东北城门</text>

  <!-- Meandering followed trail. -->
  <path d="M255 715 C331 650 389 595 468 575 C548 555 585 516 614 463 C644 408 710 416 754 370 C812 309 858 326 916 311 C1000 289 1057 345 1147 318"
        fill="none" stroke="#8b3d2e" stroke-width="7" stroke-dasharray="15 12" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>

  <!-- Battle traces and footprints. -->
  <g transform="translate(455 552)" filter="url(#shadow)">
    <circle r="38" fill="#f8f7f2" stroke="#8b3d2e" stroke-width="4"/>
    <path d="M-17 -17 L17 17 M17 -17 L-17 17" stroke="#8b3d2e" stroke-width="7" stroke-linecap="round"/>
  </g>
  <text x="455" y="619" text-anchor="middle" class="label medium">发现战斗痕迹</text>
  <text x="455" y="644" text-anchor="middle" class="label note">并锁定可追踪脚印</text>

  <g fill="#5b4635" opacity="0.88">
    <ellipse cx="548" cy="524" rx="7" ry="13" transform="rotate(42 548 524)"/>
    <ellipse cx="571" cy="494" rx="7" ry="13" transform="rotate(34 571 494)"/>
    <ellipse cx="624" cy="449" rx="7" ry="13" transform="rotate(62 624 449)"/>
    <ellipse cx="667" cy="421" rx="7" ry="13" transform="rotate(78 667 421)"/>
    <ellipse cx="730" cy="392" rx="7" ry="13" transform="rotate(50 730 392)"/>
    <ellipse cx="785" cy="343" rx="7" ry="13" transform="rotate(58 785 343)"/>
    <ellipse cx="853" cy="319" rx="7" ry="13" transform="rotate(75 853 319)"/>
  </g>
  <text x="730" y="490" text-anchor="middle" class="label medium accent" style="fill:#8b3d2e">沿脚印曲折行进约数公里</text>
  <text x="730" y="516" text-anchor="middle" class="label note">总体朝东北；并非笔直路线，精确距离未测</text>

  <!-- River, orientation intentionally approximate. -->
  <path d="M912 226 C1000 202 1085 241 1167 221 C1240 203 1300 213 1376 185" fill="none" stroke="#285b6e" stroke-width="48" opacity="0.30"/>
  <path d="M912 226 C1000 202 1085 241 1167 221 C1240 203 1300 213 1376 185" fill="none" stroke="#3f8198" stroke-width="28"/>
  <path d="M912 226 C1000 202 1085 241 1167 221 C1240 203 1300 213 1376 185" fill="none" stroke="#cce3e7" stroke-width="4" stroke-dasharray="18 14"/>
  <text x="1165" y="267" text-anchor="middle" class="label medium water" style="fill:#285b6e">河流（走向仅示意）</text>

  <!-- Zombie battle site. -->
  <g transform="translate(1138 320)" filter="url(#shadow)">
    <circle r="51" fill="#f6eee7" stroke="#8b3d2e" stroke-width="5"/>
    <path d="M-27 28 L23 -28 M-23 -28 L27 28" stroke="#8b3d2e" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#8b3d2e"/>
  </g>
  <text x="1128" y="400" text-anchor="middle" class="label medium">河边僵尸战斗点</text>
  <text x="1128" y="427" text-anchor="middle" class="label note">击败 6 只僵尸；河岸位置待确认</text>

  <!-- Grove and current position. -->
  <g transform="translate(1028 520)">
    <g fill="#55714d" stroke="#354a31" stroke-width="3">
      <circle cx="0" cy="0" r="34"/><circle cx="48" cy="-22" r="39"/><circle cx="83" cy="19" r="35"/>
      <circle cx="31" cy="35" r="40"/><circle cx="-20" cy="42" r="31"/>
    </g>
    <g stroke="#684f37" stroke-width="8"><path d="M0 27 V72"/><path d="M48 11 V69"/><path d="M83 43 V77"/><path d="M31 58 V85"/></g>
  </g>
  <text x="1068" y="626" text-anchor="middle" class="label medium">卡尔找到的小树林</text>
  <text x="1068" y="653" text-anchor="middle" class="label small accent" style="fill:#8b3d2e">KEN 当前短休位置</text>
  <path d="M1104 448 C1087 475 1074 491 1060 505" fill="none" stroke="#8b3d2e" stroke-width="4" stroke-dasharray="9 8" marker-end="url(#arrow)"/>

  <!-- Unknown directional clue beyond current reach. -->
  <path d="M1193 300 C1245 275 1280 245 1334 215" fill="none" stroke="#8b3d2e" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow)"/>
  <text x="1215" y="478" text-anchor="middle" class="label small accent" style="fill:#8b3d2e">导师线索是否继续深入：未知</text>

  <!-- Compass. -->
  <g transform="translate(1265 706)">
    <circle cx="0" cy="0" r="70" fill="#f8f7f2" stroke="#374044" stroke-width="3"/>
    <path d="M0 -57 L13 -10 L0 0 L-13 -10 Z" fill="#8b3d2e"/>
    <path d="M0 57 L13 10 L0 0 L-13 10 Z" fill="#9da6a8"/>
    <path d="M-57 0 L-10 -13 L0 0 L-10 13 Z M57 0 L10 -13 L0 0 L10 13 Z" fill="#9da6a8"/>
    <text x="0" y="-79" text-anchor="middle" class="label medium">北</text>
  </g>

  <!-- Legend. -->
  <g transform="translate(430 694)">
    <rect width="465" height="152" rx="6" fill="#f8f7f2" stroke="#374044" stroke-width="2"/>
    <text x="22" y="34" class="label medium">探索图例</text>
    <rect x="22" y="53" width="22" height="22" fill="#f5f1e5" stroke="#94a47d" stroke-width="2"/>
    <text x="56" y="71" class="label small">已探明的路线走廊</text>
    <rect x="22" y="84" width="22" height="22" fill="url(#fog)" stroke="#747a7d"/>
    <text x="56" y="102" class="label small">未知 / 未探明区域</text>
    <line x1="22" y1="126" x2="46" y2="126" stroke="#8b3d2e" stroke-width="6" stroke-dasharray="9 7"/>
    <text x="56" y="133" class="label small">小队实际追踪路线（约略）</text>
  </g>

  <text x="1335" y="852" text-anchor="end" class="label note">玩家探索图 · 仅记录当前已知信息；未知地形由 DM 决定</text>
</svg>
