<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">神源镇探索地图</title>
  <desc id="desc">以神源镇中心的厄拉西斯神殿、东侧集市与旅馆为已探明地标，标注城墙、正式东北城门、东北方向的导师线索和神源镇东方的近期黑潮战场。黑潮战场用贯穿地图东侧的方向带表示，其南北边界和具体范围未知；未探明区域以斜线表示。</desc>
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#c9c7bd" stroke-width="1" opacity="0.45"/>
    </pattern>
    <pattern id="fog" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(24)">
      <rect width="18" height="18" fill="#e5e7e8"/>
      <line x1="0" y1="0" x2="0" y2="18" stroke="#a6aaad" stroke-width="5" opacity="0.38"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#8b3d2e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#202629" flood-opacity="0.22"/>
    </filter>
    <style>
      .label { font-family: Inter, "Noto Sans SC", "Microsoft YaHei", sans-serif; fill: #202629; letter-spacing: 0; }
      .small { font-size: 18px; }
      .medium { font-size: 22px; font-weight: 650; }
      .large { font-size: 34px; font-weight: 750; }
      .note { fill: #555d60; font-size: 17px; }
      .light { fill: #f7f4ea; }
      .accent { fill: #8b3d2e; }
      .road { fill: none; stroke: #b99566; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
      .road-edge { fill: none; stroke: #7f684a; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 9 10; opacity: 0.75; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#f4f2ea"/>
  <rect x="24" y="24" width="1352" height="852" rx="6" fill="none" stroke="#333b3e" stroke-width="3"/>
  <rect x="25" y="25" width="1350" height="850" fill="url(#grid)"/>

  <!-- Unexplored northern surroundings. -->
  <path d="M25 25 H1375 V185 C1215 158 1090 202 930 165 C760 126 625 193 440 164 C275 138 145 178 25 150 Z" fill="url(#fog)"/>
  <path d="M25 180 C180 205 305 162 455 192 C635 228 770 167 935 205 C1095 242 1230 194 1375 220" fill="none" stroke="#6c7275" stroke-width="4" stroke-dasharray="13 12"/>

  <!-- Broad eastern war zone; the band communicates direction, not surveyed extent. -->
  <path d="M1165 25 H1375 V875 H1178 C1200 806 1160 740 1188 665 C1215 592 1170 525 1195 450 C1220 375 1175 305 1195 230 C1216 155 1175 88 1165 25 Z" fill="url(#fog)"/>
  <path d="M1173 25 H1375 V875 H1186 C1208 807 1168 742 1196 668 C1223 595 1178 528 1203 453 C1228 378 1183 308 1203 233 C1224 158 1183 90 1173 25 Z" fill="#394246" opacity="0.48"/>
  <path d="M1165 25 C1175 88 1216 155 1195 230 C1175 305 1220 375 1195 450 C1170 525 1215 592 1188 665 C1160 740 1200 806 1178 875" fill="none" stroke="#6c7275" stroke-width="4" stroke-dasharray="13 12"/>
  <text x="1285" y="495" text-anchor="middle" class="label medium light" style="fill:#f7f4ea">神源镇东方</text>
  <text x="1285" y="526" text-anchor="middle" class="label medium light" style="fill:#f7f4ea">近期黑潮战场</text>
  <text x="1285" y="557" text-anchor="middle" class="label small light" style="fill:#f7f4ea">东侧阴影仅表示方位</text>
  <text x="1285" y="584" text-anchor="middle" class="label small light" style="fill:#f7f4ea">南北边界与范围未知</text>
  <text x="1285" y="611" text-anchor="middle" class="label small light" style="fill:#f7f4ea">与东北导师线索不同</text>

  <!-- The wall is confirmed; its exact surveyed shape remains approximate. -->
  <path d="M178 300 C275 229 430 220 555 258 C690 205 870 224 963 292 C1091 298 1195 385 1180 493 C1210 600 1094 692 962 687 C840 754 662 729 570 695 C420 744 262 676 229 583 C121 520 103 383 178 300 Z"
        fill="#dfe9d8" stroke="#59636a" stroke-width="10" stroke-linejoin="round"/>
  <text x="238" y="275" class="label small" fill="#53634f">神源镇城墙（已确认；轮廓仅作示意）</text>

  <!-- Known roads and travel corridor. -->
  <path class="road" d="M145 493 C305 490 420 465 560 456 C705 446 835 454 1010 467 C1122 474 1225 457 1320 429"/>
  <path class="road-edge" d="M145 493 C305 490 420 465 560 456 C705 446 835 454 1010 467 C1122 474 1225 457 1320 429"/>
  <path class="road" d="M594 697 C600 610 598 538 600 450 C603 365 603 300 612 238"/>
  <path class="road-edge" d="M594 697 C600 610 598 538 600 450 C603 365 603 300 612 238"/>
  <path class="road" d="M952 455 C1000 419 1038 364 1083 314"/>
  <path class="road-edge" d="M952 455 C1000 419 1038 364 1083 314"/>

  <!-- Confirmed formal northeast gate. -->
  <g transform="translate(1082 312) rotate(-39)" filter="url(#shadow)">
    <rect x="-38" y="-25" width="25" height="50" rx="3" fill="#9da6a8" stroke="#374044" stroke-width="4"/>
    <rect x="13" y="-25" width="25" height="50" rx="3" fill="#9da6a8" stroke="#374044" stroke-width="4"/>
    <path d="M-13 -18 H13 M-13 18 H13" stroke="#374044" stroke-width="5"/>
  </g>
  <text x="938" y="326" class="label medium">东北城门</text>
  <text x="938" y="350" class="label note">正式城门</text>

  <!-- Church. -->
  <g transform="translate(540 375)" filter="url(#shadow)">
    <rect x="0" y="24" width="122" height="92" rx="4" fill="#ebe4d2" stroke="#374044" stroke-width="4"/>
    <path d="M-8 30 L61 -10 L130 30 Z" fill="#667780" stroke="#374044" stroke-width="4"/>
    <rect x="49" y="61" width="25" height="55" fill="#8b3d2e" stroke="#374044" stroke-width="3"/>
    <path d="M61 -12 V-43 M45 -29 H77" stroke="#374044" stroke-width="5"/>
  </g>
  <text x="600" y="527" text-anchor="middle" class="label medium">厄拉西斯神殿</text>
  <text x="600" y="551" text-anchor="middle" class="label note">位于神源镇中心</text>

  <!-- Market. -->
  <g transform="translate(738 410)" filter="url(#shadow)">
    <path d="M0 33 L26 0 L52 33 Z" fill="#b44b3d" stroke="#374044" stroke-width="3"/>
    <rect x="8" y="33" width="36" height="39" fill="#f0d8ad" stroke="#374044" stroke-width="3"/>
    <path d="M58 33 L84 0 L110 33 Z" fill="#3d7484" stroke="#374044" stroke-width="3"/>
    <rect x="66" y="33" width="36" height="39" fill="#f0d8ad" stroke="#374044" stroke-width="3"/>
  </g>
  <text x="793" y="514" text-anchor="middle" class="label medium">集市</text>
  <text x="793" y="538" text-anchor="middle" class="label note">前往厄拉西斯神殿途中经过</text>

  <!-- Inn. -->
  <g transform="translate(936 391)" filter="url(#shadow)">
    <rect x="0" y="24" width="120" height="86" rx="4" fill="#d8b981" stroke="#374044" stroke-width="4"/>
    <path d="M-7 28 L60 -5 L127 28 Z" fill="#77483c" stroke="#374044" stroke-width="4"/>
    <rect x="18" y="53" width="27" height="25" fill="#79a9ba" stroke="#374044" stroke-width="3"/>
    <rect x="76" y="56" width="27" height="54" fill="#563f31" stroke="#374044" stroke-width="3"/>
    <path d="M125 39 H161 V72 H125" fill="none" stroke="#374044" stroke-width="4"/>
    <text x="143" y="63" text-anchor="middle" class="label small">杯</text>
  </g>
  <text x="997" y="536" text-anchor="middle" class="label medium">第一晚旅馆</text>
  <text x="997" y="560" text-anchor="middle" class="label note">名称尚未记录</text>

  <!-- Distance annotation. -->
  <path d="M665 590 H932" stroke="#202629" stroke-width="2"/>
  <path d="M665 579 V601 M932 579 V601" stroke="#202629" stroke-width="2"/>
  <text x="798" y="621" text-anchor="middle" class="label small">厄拉西斯神殿 → 旅馆：向东约 500 米</text>

  <!-- Mentor clue direction. -->
  <path d="M1106 292 C1170 255 1222 213 1287 174" fill="none" stroke="#8b3d2e" stroke-width="6" stroke-dasharray="14 10" marker-end="url(#arrow)"/>
  <text x="1110" y="238" text-anchor="middle" class="label medium accent" style="fill:#8b3d2e">导师线索：东北方向</text>
  <text x="1110" y="265" text-anchor="middle" class="label note">从正式东北城门出城；目标与距离未知</text>

  <!-- Compass. -->
  <g transform="translate(1260 690)">
    <circle cx="0" cy="0" r="74" fill="#f8f7f2" stroke="#374044" stroke-width="3"/>
    <path d="M0 -60 L13 -10 L0 0 L-13 -10 Z" fill="#8b3d2e"/>
    <path d="M0 60 L13 10 L0 0 L-13 10 Z" fill="#9da6a8"/>
    <path d="M-60 0 L-10 -13 L0 0 L-10 13 Z M60 0 L10 -13 L0 0 L10 13 Z" fill="#9da6a8"/>
    <text x="0" y="-83" text-anchor="middle" class="label medium" style="fill:#f7f4ea">北</text>
  </g>

  <!-- Legend. -->
  <g transform="translate(70 694)">
    <rect width="520" height="168" rx="6" fill="#f8f7f2" stroke="#374044" stroke-width="2"/>
    <text x="22" y="33" class="label medium">探索图例</text>
    <circle cx="31" cy="63" r="9" fill="#dfe9d8" stroke="#60705b" stroke-width="2"/>
    <text x="53" y="70" class="label small">已到访地标或已确认路线</text>
    <rect x="22" y="84" width="20" height="20" fill="url(#fog)" stroke="#747a7d"/>
    <text x="53" y="101" class="label small">未知 / 未探明区域</text>
    <line x1="23" y1="123" x2="44" y2="123" stroke="#8b3d2e" stroke-width="5" stroke-dasharray="8 6"/>
    <text x="53" y="130" class="label small">仅知方向的线索</text>
    <line x1="23" y1="151" x2="44" y2="151" stroke="#59636a" stroke-width="8"/>
    <text x="53" y="158" class="label small">已确认存在的城墙</text>
  </g>

  <text x="1135" y="852" text-anchor="end" class="label note">玩家探索图 · 方位与距离为当前认知，不代表精确测绘</text>
</svg>
